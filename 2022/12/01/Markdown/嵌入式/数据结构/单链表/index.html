">123</span><br><span class="line">124</span><br><span class="line">125</span><br><span class="line">126</span><br><span class="line">127</span><br><span class="line">128</span><br><span class="line">129</span><br><span class="line">130</span><br><span class="line">131</span><br><span class="line">132</span><br><span class="line">133</span><br><span class="line">134</span><br><span class="line">135</span><br><span class="line">136</span><br><span class="line">137</span><br><span class="line">138</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;iostream&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;stdio.h&gt;</span></span></span><br><span class="line"><span class="keyword">using</span> <span class="keyword">namespace</span> std;</span><br><span class="line"></span><br><span class="line"><span class="meta">#<span class="keyword">define</span> MAXSIZE 100</span></span><br><span class="line"><span class="comment">//函数结果状态代码</span></span><br><span class="line"><span class="meta">#<span class="keyword">define</span> OK 1</span></span><br><span class="line"><span class="meta">#<span class="keyword">define</span> ERROR 0</span></span><br><span class="line"><span class="meta">#<span class="keyword">define</span> OVERFLOW -2</span></span><br><span class="line"></span><br><span class="line"><span class="comment">//status 是函数返回值类型，其值是函数结果状态代码</span></span><br><span class="line"><span class="keyword">typedef</span> <span class="type">int</span> ElemType;</span><br><span class="line"><span class="keyword">typedef</span>  <span class="type">int</span> Status;</span><br><span class="line"><span class="comment">//</span></span><br><span class="line"><span class="keyword">typedef</span> <span class="keyword">struct</span> <span class="title class_">LNode</span>&#123;</span><br><span class="line">    ElemType data;              <span class="comment">//结点的数据域</span></span><br><span class="line">    <span class="keyword">struct</span> <span class="title class_">LNode</span> *next;         <span class="comment">//结点的指针域</span></span><br><span class="line">&#125;LNode,*LinkList;               <span class="comment">//LinkList为指向结构体LNode的指针类型</span></span><br><span class="line"></span><br><span class="line"><span class="comment">//初始化</span></span><br><span class="line"><span class="function">Status <span class="title">InitList</span><span class="params">(LinkList &amp;L)</span></span>&#123;</span><br><span class="line">    L = <span class="keyword">new</span> LNode;              <span class="comment">//生成新结点作为头结点，用头指针L指向头结点</span></span><br><span class="line">    L-&gt;next = <span class="literal">NULL</span>;             <span class="comment">//头结点的指针域置空</span></span><br><span class="line">    <span class="keyword">return</span> OK;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">//头插法</span></span><br><span class="line"><span class="function">Status <span class="title">ListHeadInsert</span><span class="params">(LinkList &amp;L,  ElemType e)</span></span>&#123;</span><br><span class="line">    LinkList p = L;</span><br><span class="line">    LinkList s=<span class="keyword">new</span> LNode;</span><br><span class="line">    s-&gt;data = e;</span><br><span class="line">    s-&gt;next = p-&gt;next;</span><br><span class="line">    p-&gt;next = s;</span><br><span class="line">    <span class="keyword">return</span> OK;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">//尾插法</span></span><br><span class="line"><span class="function">Status <span class="title">ListTailInsert</span><span class="params">(LinkList &amp;L, <span class="type">int</span> i, ElemType e)</span></span>&#123;</span><br><span class="line">    LinkList p = L;</span><br><span class="line">    <span class="type">int</span> j = <span class="number">0</span>;</span><br><span class="line">    <span class="keyword">if</span>(!p || j&gt;i<span class="number">-1</span>) <span class="keyword">return</span> ERROR;       <span class="comment">//i&gt;n+1 或者 i≤1</span></span><br><span class="line">    <span class="keyword">while</span>(p &amp;&amp; (j&lt;i<span class="number">-1</span>))&#123;</span><br><span class="line">        p = p-&gt;next;</span><br><span class="line">        ++j;                        <span class="comment">//查找到第i-1个结点，p指向该结点</span></span><br><span class="line">    &#125;</span><br><span class="line">    LinkList s=<span class="keyword">new</span> LNode;           <span class="comment">//生成新结点 *s</span></span><br><span class="line">    s-&gt;data = e;                    <span class="comment">//将结点*s的数据域置为e</span></span><br><span class="line">    s-&gt;next = p-&gt;next;              <span class="comment">//将结点 *s的指针域指向结点 p的指针域</span></span><br><span class="line">    p-&gt;next = s;                    <span class="comment">//将结点*p的指针域指向结点*s</span></span><br><span class="line">    <span class="keyword">return</span> OK;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function">Status <span class="title">GetElem</span><span class="params">(LinkList L, <span class="type">int</span> i, ElemType &amp;e)</span> </span>&#123;</span><br><span class="line">    <span class="comment">//在带头结点的单链表L中根据序号l.获取元素的值，用e返回L中第l.个数据元素的值</span></span><br><span class="line">    LinkList p = L-&gt;next;</span><br><span class="line">    <span class="type">int</span> j = <span class="number">1</span>;                              <span class="comment">//初始化，p指向首元结点，计数器］初值赋为1</span></span><br><span class="line">    <span class="keyword">while</span> (p &amp;&amp; j &lt; i) &#123;                <span class="comment">//顺链域向后扫描，直到p为空或p指向第l.个元素</span></span><br><span class="line">        p = p-&gt;next;                    <span class="comment">//p指向下一个结点</span></span><br><span class="line">        ++j;                            <span class="comment">//计数器j相应加1</span></span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">if</span> (!p || j &gt; i) <span class="keyword">return</span> ERROR;      <span class="comment">// i值不合法 i&gt;n或i≤0</span></span><br><span class="line">    e = p-&gt;data;                        <span class="comment">//取第i个结点的数据域</span></span><br><span class="line">    <span class="keyword">return</span> OK;</span><br><span class="line">&#125;</span><br><span class="line"><span class="function">LNode *<span class="title">LocateELem</span><span class="params">(LinkList L, ElemType e)</span> </span>&#123;</span><br><span class="line">    <span class="comment">//在带头结点的单链表L中查找值为e的元素</span></span><br><span class="line">    LinkList p = L-&gt;next;                            <span class="comment">//初始化，p指向首元结点</span></span><br><span class="line">    <span class="keyword">while</span> (p &amp;&amp; p-&gt;data != e) &#123;             <span class="comment">//顺链域向后扫描，直到p为空或p所指结点的数据域等于e</span></span><br><span class="line">        p = p-&gt;next;                        <span class="comment">//p指向下一个结点</span></span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">return</span> p;                               <span class="comment">//查找成功返回值为e的结点地址p, 查找失败p为NULL</span></span><br><span class="line">&#125;</span><br><span class="line"><span class="function">Status <span class="title">ListDelete</span><span class="params">(LinkList &amp;L, <span class="type">int</span> i)</span> </span>&#123;</span><br><span class="line"><span class="comment">//在带头结点的单链表L中，删除第l个元素</span></span><br><span class="line">    LinkList p = L;</span><br><span class="line">    <span class="type">int</span> j = <span class="number">0</span>;</span><br><span class="line">    <span class="keyword">while</span> ((p-&gt;next) &amp;&amp; (j &lt; i - <span class="number">1</span>)) &#123;              <span class="comment">//查找第i-1个结点，p指向该结点</span></span><br><span class="line">        p = p-&gt;next;</span><br><span class="line">        ++j;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">if</span> (!(p-&gt;next) || (j &gt; i - <span class="number">1</span>)) <span class="keyword">return</span> ERROR;    <span class="comment">//当i＞n或i＜1时，删除位置不合理</span></span><br><span class="line">    LinkList q = p-&gt;next;                                    <span class="comment">//临时保存被删结点的地址以备释放</span></span><br><span class="line">    p-&gt;next = q-&gt;next;                              <span class="comment">//改变删除结点前驱结点的指针域</span></span><br><span class="line">    <span class="keyword">delete</span> q;                                       <span class="comment">//释放删除结点的空间</span></span><br><span class="line">    <span class="keyword">return</span> OK;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">main</span><span class="params">()</span></span>&#123;</span><br><span class="line">    LinkList L;</span><br><span class="line">    LinkList p;</span><br><span class="line">    <span class="built_in">InitList</span>(L);</span><br><span class="line"></span><br><span class="line">    cout&lt;&lt;<span class="string">&quot;头插法插入值：&quot;</span>;</span><br><span class="line">    <span class="keyword">for</span>(<span class="type">int</span> i =<span class="number">1</span>;i&lt;=<span class="number">5</span>;i++)&#123;</span><br><span class="line">        <span class="built_in">ListHeadInsert</span>(L,i);</span><br><span class="line">        cout&lt;&lt;i&lt;&lt;<span class="string">&quot; &quot;</span>;</span><br><span class="line">    &#125;cout&lt;&lt;endl;</span><br><span class="line">    p=L-&gt;next;</span><br><span class="line">    cout&lt;&lt;<span class="string">&quot;链表输出值：&quot;</span>;</span><br><span class="line">    <span class="keyword">while</span>(p)&#123;</span><br><span class="line">        cout&lt;&lt;p-&gt;data&lt;&lt;<span class="string">&quot; &quot;</span>;</span><br><span class="line">        p=p-&gt;next;</span><br><span class="line">    &#125;cout&lt;&lt;endl;</span><br><span class="line"></span><br><span class="line">    cout&lt;&lt;<span class="string">&quot;尾插法插入值：&quot;</span>;</span><br><span class="line">    <span class="keyword">for</span>(<span class="type">int</span> i=<span class="number">6</span>; i&lt;=<span class="number">10</span>; i++)&#123;</span><br><span class="line">        <span class="built_in">ListTailInsert</span>(L,i,i);</span><br><span class="line">        cout&lt;&lt;i&lt;&lt;<span class="string">&quot; &quot;</span>;</span><br><span class="line">    &#125;cout&lt;&lt;endl;</span><br><span class="line">    p=L-&gt;next;</span><br><span class="line">    cout&lt;&lt;<span class="string">&quot;链表输出值：&quot;</span>;</span><br><span class="line">    <span class="keyword">while</span>(p)&#123;</span><br><span class="line">        cout&lt;&lt;p-&gt;data&lt;&lt;<span class="string">&quot; &quot;</span>;</span><br><span class="line">        p=p-&gt;next;</span><br><span class="line">    &#125;cout&lt;&lt;endl;</span><br><span class="line"></span><br><span class="line">    cout&lt;&lt;<span class="string">&quot;链表取第5个值：&quot;</span>;</span><br><span class="line">    <span class="type">int</span> e = <span class="number">0</span>;</span><br><span class="line">    <span class="built_in">GetElem</span>(L,<span class="number">5</span>,e);</span><br><span class="line">    cout&lt;&lt;e&lt;&lt;endl;</span><br><span class="line"></span><br><span class="line">    cout&lt;&lt;<span class="string">&quot;查询数字7：结果为：&quot;</span>&lt;&lt;<span class="built_in">LocateELem</span>(L,<span class="number">7</span>)&lt;&lt;<span class="string">&quot;\t输出该地址的内容：&quot;</span>&lt;&lt;<span class="built_in">LocateELem</span>(L,<span class="number">7</span>)-&gt;data&lt;&lt;endl;</span><br><span class="line"></span><br><span class="line">    cout&lt;&lt;<span class="string">&quot;删除数值：&quot;</span>;</span><br><span class="line">    <span class="keyword">for</span>(<span class="type">int</span> i =<span class="number">1</span>;i&lt;=<span class="number">5</span>;i++) &#123;</span><br><span class="line">        <span class="built_in">ListDelete</span>(L, i);</span><br><span class="line">        cout&lt;&lt;i&lt;&lt;<span class="string">&quot; &quot;</span>;</span><br><span class="line">    &#125;cout&lt;&lt;endl;</span><br><span class="line">    p=L-&gt;next;</span><br><span class="line">    cout&lt;&lt;<span class="string">&quot;链表输出值：&quot;</span>;</span><br><span class="line">    <span class="keyword">while</span>(p)&#123;</span><br><span class="line">        cout&lt;&lt;p-&gt;data&lt;&lt;<span class="string">&quot; &quot;</span>;</span><br><span class="line">        p=p-&gt;next;</span><br><span class="line">    &#125;cout&lt;&lt;endl;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
