<figure class="highlight c"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">if</span>(BSP_PB_GetState(BUTTON_WAKEUP) != RESET)</span><br><span class="line">    &#123;</span><br><span class="line">      HAL_Delay(<span class="number">10</span>);</span><br><span class="line">      <span class="keyword">while</span> (BSP_PB_GetState(BUTTON_WAKEUP) != RESET);   <span class="comment">/* Wait for button released */</span></span><br><span class="line">      </span><br><span class="line">      BSP_examples[DemoIndex++].DemoFunc();</span><br><span class="line">      </span><br><span class="line">      <span class="keyword">if</span>(DemoIndex &gt;= COUNT_OF_EXAMPLE(BSP_examples))</span><br><span class="line">      &#123;</span><br><span class="line">        <span class="comment">/* Increment number of loops which be used by EEPROM example */</span></span><br><span class="line">        NbLoop++;</span><br><span class="line">        DemoIndex = <span class="number">0</span>;</span><br><span class="line">      &#125;</span><br><span class="line">      Display_DemoDescription();</span><br><span class="line">    &#125;</span><br><span class="line">    Toggle_Leds();</span><br></pre></td></tr></table></figure>
